name: Budowanie APK z luźnych plików (Wersja Java 17)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Pobranie plików z Twojego nowego repozytorium GitHub
        uses: actions/checkout@v4

      - name: Instalacja Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalacja narzędzia Cordova
        run: npm install -g cordova

      - name: Tworzenie projektu i kopiowanie luźnych plików gry
        run: |
          cordova create my-app com.example.robloxapp "RobloxFanApp"
          cd my-app
          cordova platform add android

      - name: Czyszczenie domyślnych plików Cordovy
        run: rm -rf my-app/www/*

      - name: Kopiowanie Twoich plików z repozytorium do folderu www aplikacji
        run: cp -r ./* www/ 2>/dev/null || true
        working-directory: my-app

      - name: NOWA KONFIGURACJA JAVY (Naprawia błąd z Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Kompilacja i sprawdzenie błędów
        run: cordova build android --debug
        working-directory: my-app

      - name: Archiwizacja pliku APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: my-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
