name: Budowanie APK z luźnych plików (Bez ZIP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pobranie plików z Twojego repozytorium GitHub
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Instalacja Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # 3. Instalacja narzędzia Cordova
    - name: Install Cordova
      run: npm install -g cordova

    # 4. Tworzenie projektu i kopiowanie luźnych plików
    - name: Prepare Project
      run: |
        cordova create my-app com.example.robloxapp "RobloxFanApp"
        cd my-app
        cordova platform add android
        
        # Czyszczenie domyślnych plików Cordovy
        rm -rf www/*
        
        # Kopiowanie wszystkich Twoich plików z repozytorium do folderu www aplikacji
        # Omijamy folder my-app oraz ukryte foldery systemowe GitHuba
        cp -r ../* www/ 2>/dev/null || true
        rm -rf www/my-app

    # 5. Konfiguracja Javy
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    # 6. Kompilacja i sprawdzenie błędów (bez zapisu pliku)
    - name: Build Android APK
      run: |
        cd my-app
        cordova build android --debug
        
