name: Budowanie APK z pliku ZIP (Bez Artifact)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pobranie kodu z repozytorium
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Instalacja Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # 3. Instalacja Cordovy (narzędzia do robienia APK)
    - name: Install Cordova
      run: npm install -g cordova

    # 4. Tworzenie projektu Cordova i rozpakowanie Twoich plików
    # (Upewnij się, że Twój plik nazywa się projekt.zip i jest w głównym folderze)
    - name: Prepare Project
      run: |
        cordova create my-app com.example.robloxapp "RobloxFanApp"
        cd my-app
        cordova platform add android
        rm -rf www/*
        unzip ../projekt.zip -d www/

    # 5. Konfiguracja Javy potrzebnej do Android SDK
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    # 6. Budowanie pliku APK (Tylko testowa kompilacja)
    - name: Build Android APK
      run: |
        cd my-app
        cordova build android --debug
        
