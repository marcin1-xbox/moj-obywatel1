name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-index: '20'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: cordova create my-app com.example.myapp MyApp

    - name: Add Android Platform
      run: |
        cd my-app
        cordova platform add android

    - name: Copy Resources to Cordova www
      run: |
        # Tworzy folder www, jeśli nie istnieje
        mkdir -p my-app/www
        
        # Kopiuje index.html, zdjęcia i całą zawartość repozytorium do folderu www
        cp -r * my-app/www/ 2>/dev/null || true
        
        # Sprawdza czy plik index.html na pewno tam jest
        ls -la my-app/www

    - name: Build Android APK
      run: |
        cd my-app
        cordova build android --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: my-app/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
